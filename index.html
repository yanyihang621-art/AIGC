<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寻迹华夏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      /* ── Design Tokens ─────────────────────────────── */
      :root {
        --bg:        oklch(0.990 0.005 85);
        --surface:   oklch(0.960 0.010 85);
        --ink:       oklch(0.200 0.020 230);
        --primary:   oklch(0.450 0.086 230);
        --accent:    oklch(0.450 0.080 35);
        --muted:     oklch(0.550 0.015 230);
        --divider:   oklch(0.880 0.010 230 / 0.6);
 
        --font-display: 'Noto Serif SC', 'SimSun', serif;
        --font-body:    'Noto Sans SC', 'PingFang SC', sans-serif;
 
        --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-quint: cubic-bezier(0.22, 1, 0.36, 1);
      }
 
      /* ── Reset ─────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.8;
        overflow: hidden;
      }
 
      /* ── Layout ────────────────────────────────────── */
      #app {
        display: grid;
        grid-template-columns: 65fr 35fr;
        grid-template-rows: 100vh;
        height: 100vh;
      }
 
      /* ── Left: Map Panel ───────────────────────────── */
      #map-panel {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2.5rem;
        border-right: 1px solid var(--divider);
        overflow: hidden;
      }
 
      /* decorative ink wash bg circle */
      #map-panel::before {
        content: '';
        position: absolute;
        inset: -10%;
        background: radial-gradient(
          ellipse 60% 55% at 50% 52%,
          oklch(0.450 0.086 230 / 0.05) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
 
      /* top title */
      #map-title {
        position: absolute;
        top: 2rem;
        left: 2.5rem;
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 300;
        letter-spacing: 0.35em;
        color: var(--muted);
      }
 
      /* SVG map placeholder — swap with real china.svg */
      #map-placeholder {
        width: 100%;
        max-width: 620px;
        aspect-ratio: 1.1 / 1;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
 
      /* ── Real SVG map styles (applied once SVG is inserted) ── */
      #china-map {
        width: 100%;
        height: 100%;
      }
 
      #china-map path {
        fill: oklch(0.920 0.012 230);
        stroke: oklch(0.450 0.086 230 / 0.25);
        stroke-width: 0.6;
        cursor: pointer;
        transition:
          fill 0.45s var(--ease-expo),
          stroke 0.45s var(--ease-expo),
          filter 0.45s var(--ease-expo);
      }
 
      #china-map path:hover {
        fill: oklch(0.450 0.086 230 / 0.15);
        stroke: var(--primary);
        stroke-width: 1;
        filter: drop-shadow(0 0 8px oklch(0.450 0.086 230 / 0.20));
      }
 
      #china-map path.active {
        fill: oklch(0.450 0.086 230 / 0.22);
        stroke: var(--primary);
        stroke-width: 1.2;
      }
 
      /* placeholder UI before SVG arrives */
      #map-placeholder-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        opacity: 0.38;
      }
 
      #map-placeholder-inner svg { width: 64px; height: 64px; }
 
      #map-placeholder-inner p {
        font-family: var(--font-display);
        font-size: 0.85rem;
        letter-spacing: 0.2em;
        color: var(--muted);
      }
 
      /* Tooltip */
      #tooltip {
        position: fixed;
        pointer-events: none;
        font-family: var(--font-display);
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        color: var(--bg);
        background: var(--ink);
        padding: 0.3rem 0.75rem;
        opacity: 0;
        transition: opacity 0.2s var(--ease-quint);
        white-space: nowrap;
        z-index: 100;
      }
 
      #tooltip.visible { opacity: 1; }
 
      /* ── Right: Content Panel ──────────────────────── */
      #content-panel {
        display: flex;
        flex-direction: column;
        padding: 3rem 2.5rem 2.5rem;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--divider) transparent;
      }
 
      /* Panel header */
      #panel-header {
        margin-bottom: 2.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--divider);
      }
 
      #panel-eyebrow {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        color: var(--primary);
        font-weight: 500;
        margin-bottom: 0.6rem;
        text-transform: uppercase;
      }
 
      #panel-province {
        font-family: var(--font-display);
        font-size: 2.2rem;
        font-weight: 300;
        line-height: 1.2;
        color: var(--ink);
        transition: opacity 0.5s var(--ease-expo);
      }
 
      /* Content area */
      #panel-body {
        flex: 1;
        position: relative;
      }
 
      /* idle state */
      #idle-state {
        display: flex;
        flex-direction: column;
        gap: 1.4rem;
        padding-top: 1rem;
        transition: opacity 0.5s var(--ease-expo);
      }
 
      #idle-state .idle-line {
        height: 1px;
        background: var(--divider);
        transform-origin: left;
        animation: idle-appear 1.2s var(--ease-expo) both;
      }
 
      #idle-state .idle-line:nth-child(1) { width: 80%; animation-delay: 0.1s; }
      #idle-state .idle-line:nth-child(2) { width: 60%; animation-delay: 0.2s; }
      #idle-state .idle-line:nth-child(3) { width: 72%; animation-delay: 0.3s; }
      #idle-state .idle-line:nth-child(4) { width: 45%; animation-delay: 0.4s; }
 
      @keyframes idle-appear {
        from { transform: scaleX(0); opacity: 0; }
        to   { transform: scaleX(1); opacity: 1; }
      }
 
      #idle-hint {
        font-family: var(--font-display);
        font-size: 0.82rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        line-height: 1.9;
        margin-top: 1rem;
      }
 
      /* loading state — ink wash pulse */
      #loading-state {
        display: none;
        flex-direction: column;
        gap: 1.5rem;
        padding-top: 1rem;
      }
 
      .ink-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--primary);
        animation: ink-pulse 1.8s var(--ease-expo) infinite;
      }
 
      .ink-dot:nth-child(2) { animation-delay: 0.3s; opacity: 0.6; }
      .ink-dot:nth-child(3) { animation-delay: 0.6s; opacity: 0.3; }
 
      .ink-dots-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
 
      @keyframes ink-pulse {
        0%, 100% { transform: scale(1);   opacity: 0.8; }
        50%       { transform: scale(1.6); opacity: 0.2; }
      }
 
      .loading-lines {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
 
      .loading-line-shimmer {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          oklch(0.450 0.086 230 / 0.35) 50%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: shimmer 2s var(--ease-expo) infinite;
      }
 
      .loading-line-shimmer:nth-child(1) { width: 90%; }
      .loading-line-shimmer:nth-child(2) { width: 70%; animation-delay: 0.2s; }
      .loading-line-shimmer:nth-child(3) { width: 82%; animation-delay: 0.4s; }
 
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
 
      /* generated content */
      #generated-content {
        display: none;
        opacity: 0;
        transition: opacity 0.7s var(--ease-expo);
      }
 
      #generated-content.visible {
        display: block;
        opacity: 1;
      }
 
      #generated-text {
        font-family: var(--font-body);
        font-size: 0.9rem;
        line-height: 2;
        color: var(--ink);
        max-width: 42ch;
      }
 
      /* section divider in generated content */
      .content-section {
        margin-bottom: 2rem;
      }
 
      .content-section-title {
        font-family: var(--font-display);
        font-size: 0.72rem;
        letter-spacing: 0.25em;
        color: var(--primary);
        margin-bottom: 0.8rem;
        text-transform: uppercase;
      }
 
      /* cursor blink */
      .cursor {
        display: inline-block;
        width: 1px;
        height: 1em;
        background: var(--ink);
        margin-left: 1px;
        vertical-align: text-bottom;
        animation: blink 1s step-end infinite;
      }
 
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
 
      /* Panel footer */
      #panel-footer {
        margin-top: auto;
        padding-top: 2rem;
        border-top: 1px solid var(--divider);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
 
      #footer-brand {
        font-family: var(--font-display);
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        color: var(--muted);
      }
 
      #footer-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.6;
      }
 
      /* ── Reduced motion ────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.15s !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
 
      <!-- LEFT: Map Panel -->
      <section id="map-panel" aria-label="中国地图">
        <span id="map-title">寻迹华夏</span>
 
        <div id="map-placeholder">
          <!-- Replace this inner div with the actual <svg id="china-map"> -->
          <div id="map-placeholder-inner">
            <!-- Simple brush-stroke style placeholder icon -->
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 48 Q20 20 32 16 Q44 12 52 28 Q56 38 48 50 Q40 60 28 56 Q16 52 12 48Z"
                stroke="currentColor" stroke-width="1.2" fill="none" color="oklch(0.450 0.086 230 / 0.5)"/>
              <path d="M24 32 Q28 28 34 30 Q38 32 36 38"
                stroke="currentColor" stroke-width="1" fill="none" color="oklch(0.450 0.080 35 / 0.6)"/>
            </svg>
            <p>请放置地图文件</p>
          </div>
        </div>
 
        <!-- Tooltip -->
        <div id="tooltip" role="tooltip"></div>
      </section>
 
      <!-- RIGHT: Content Panel -->
      <aside id="content-panel" aria-label="文化内容">
 
        <header id="panel-header">
          <p id="panel-eyebrow">文化探寻</p>
          <h1 id="panel-province">点击省份<br/>开始探寻</h1>
        </header>
 
        <div id="panel-body">
 
          <!-- Idle state -->
          <div id="idle-state" aria-hidden="true">
            <div class="idle-line"></div>
            <div class="idle-line"></div>
            <div class="idle-line"></div>
            <div class="idle-line"></div>
            <p id="idle-hint">在这片土地上<br/>每一处山河都藏着故事<br/>每一方人情都蕴着文明</p>
          </div>
 
          <!-- Loading state -->
          <div id="loading-state" aria-live="polite" aria-label="正在生成内容">
            <div class="ink-dots-row">
              <div class="ink-dot"></div>
              <div class="ink-dot"></div>
              <div class="ink-dot"></div>
            </div>
            <div class="loading-lines">
              <div class="loading-line-shimmer"></div>
              <div class="loading-line-shimmer"></div>
              <div class="loading-line-shimmer"></div>
            </div>
          </div>
 
          <!-- Generated content -->
          <div id="generated-content" aria-live="polite">
            <div id="generated-text"></div>
          </div>
 
        </div>
 
        <footer id="panel-footer">
          <span id="footer-brand">寻迹华夏 · AIGC</span>
          <div id="footer-dot"></div>
        </footer>
 
      </aside>
    </div>
 
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
